<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBD Pick | 音声ダイジェスト</title>
  <meta name="description" content="IBD Pick 音声ダイジェスト - 最新のIBD論文を音声でお届けします">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0055a5 0%, #0077cc 100%);
      padding: 28px 28px 24px;
      color: #fff;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 13px;
      opacity: 0.8;
    }

    .body {
      padding: 28px;
    }

    .paper-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a2a3a;
      line-height: 1.6;
      margin-bottom: 20px;
      min-height: 24px;
    }

    .player-wrap {
      background: #f5f8fc;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .player-label {
      font-size: 12px;
      color: #6b7a8d;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    audio {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      outline: none;
    }

    audio::-webkit-media-controls-panel {
      background: #e8f0fa;
    }

    .error-msg {
      display: none;
      background: #fff3f3;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: #c0392b;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .note {
      font-size: 12px;
      color: #8a9ab0;
      line-height: 1.7;
      border-top: 1px solid #eef1f5;
      padding-top: 16px;
    }

    .note a {
      color: #0066cc;
      text-decoration: none;
    }

    .note a:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      padding: 16px 0;
      color: #6b7a8d;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">IBD Pick</div>
      <h1>音声ダイジェスト</h1>
      <div class="subtitle">週刊 IBD 論文ナレーション</div>
    </div>
    <div class="body">
      <div class="paper-title" id="paper-title">
        <span class="loading">読み込み中...</span>
      </div>

      <div class="error-msg" id="error-msg">
        音声ファイルの読み込みに失敗しました。リンクの有効期限が切れている可能性があります。<br>
        最新のメールから再度アクセスしてください。
      </div>

      <div class="player-wrap">
        <div class="player-label">🎧 音声を再生</div>
        <audio id="audio-player" controls preload="metadata">
          お使いのブラウザは音声再生に対応していません。
        </audio>
      </div>

      <div class="note">
        このナレーションはAIが自動生成したものです。内容の正確性については原著論文をご確認ください。<br>
        <a href="https://ibdpick.com" target="_blank">IBD Pick トップページ</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const audioUrl = params.get('audio');
      const title = params.get('title');

      const titleEl = document.getElementById('paper-title');
      const audioEl = document.getElementById('audio-player');
      const errorEl = document.getElementById('error-msg');

      // タイトルを表示
      if (title) {
        titleEl.textContent = decodeURIComponent(title);
      } else {
        titleEl.textContent = 'IBD Pick 論文ナレーション';
      }

      // 音声URLをセット
      if (audioUrl) {
        const decodedUrl = decodeURIComponent(audioUrl);
        audioEl.src = decodedUrl;

        audioEl.addEventListener('error', function () {
          errorEl.style.display = 'block';
          audioEl.style.display = 'none';
        });
      } else {
        errorEl.textContent = '音声URLが指定されていません。メールのリンクから再度アクセスしてください。';
        errorEl.style.display = 'block';
        audioEl.style.display = 'none';
        titleEl.textContent = 'IBD Pick 音声ダイジェスト';
      }
    })();
  </script>
</body>
</html>
