<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBD Pick - 登録確認</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
    p { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .badge.error { background: #fdecea; color: #c62828; }
    .badge.loading { background: #e3f2fd; color: #1565c0; }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .note { font-size: 13px; color: #999; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #1565c0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-section { display: block; }
    #success-section { display: none; }
    #error-section { display: none; }
    .btn-notion {
      display: inline-block;
      margin-top: 20px;
      background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
      color: #ffffff !important;
      font-weight: bold;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      -webkit-text-fill-color: #ffffff;
    }
    .btn-notion:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">

    <!-- ローディング -->
    <div id="loading-section">
      <div class="spinner"></div>
      <h1>登録を確認中...</h1>
      <p>しばらくお待ちください。</p>
    </div>

    <!-- 成功 -->
    <div id="success-section">
      <div class="icon">✅</div>
      <div class="badge">登録完了</div>
      <h1>IBD Pick への登録が確定しました</h1>
      <p>毎週月曜日にダイジェストメールをお届けします。</p>
      <p>まもなくお礼のメールをお送りします。</p>
      <hr class="divider">
      <p class="note">IBD Pick は PubMed 掲載の IBD 関連論文を毎週収集・要約した情報サービスです。</p>
      <a href="https://www.notion.so/IBD-Pick-31340ea63a3e8063810ac2769b470fec" class="btn-notion" target="_blank">過去のダイジェストを見る →</a>
    </div>

    <!-- エラー -->
    <div id="error-section">
      <div class="icon">⚠️</div>
      <div class="badge error" id="error-badge">エラー</div>
      <h1 id="error-title">確認リンクが無効です</h1>
      <p id="error-msg">リンクの有効期限が切れているか、URLが正しくありません。</p>
      <hr class="divider">
      <p class="note">お手数ですが、登録フォームから再度お申し込みください。</p>
    </div>

  </div>

  <script>
    // URLパラメータからtokenを取得
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function showSuccess() {
      document.getElementById('loading-section').style.display = 'none';
      document.getElementById('success-section').style.display = 'block';
    }

    function showError(title, msg) {
      document.getElementById('loading-section').style.display = 'none';
      document.getElementById('error-section').style.display = 'block';
      if (title) document.getElementById('error-title').textContent = title;
      if (msg) document.getElementById('error-msg').textContent = msg;
    }

    if (!token) {
      showError('URLが正しくありません', '確認リンクが不完全です。メール内のリンクをそのままクリックしてください。');
    } else {
      // Google Apps Script WebアプリにトークンをPOSTして確認処理
      const GAS_URL = 'https://script.google.com/macros/s/AKfycbz_Vi6zMJ6KtgZWkN2p8Sh7YBXQww-MqHCPuLfaXZrzlAw-T4r2VZzsHcJ3cTMUZU_J/exec';

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'token=' + encodeURIComponent(token)
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'ok') {
          showSuccess();
        } else if (data.status === 'expired') {
          showError('リンクの有効期限が切れています', '確認メールの有効期限は24時間です。再度登録フォームからお申し込みください。');
        } else if (data.status === 'already') {
          showSuccess(); // 既に確認済みでも成功扱い
        } else {
          showError('確認に失敗しました', data.message || '時間をおいて再度お試しください。');
        }
      })
      .catch(() => {
        showError('通信エラー', 'ネットワークエラーが発生しました。時間をおいて再度お試しください。');
      });
    }
  </script>
</body>
</html>
