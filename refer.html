<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBD Pick - ご紹介ありがとうございます</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    .referral-badge {
      display: inline-block;
      background: #e8f4fd;
      color: #1a6fa8;
      border: 1px solid #b3d7f0;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
    .lead { font-size: 16px; color: #333; line-height: 1.7; margin-bottom: 8px; }
    p { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 8px; }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .feature-list {
      text-align: left;
      background: #f8fbff;
      border-radius: 8px;
      padding: 18px 22px;
      margin: 20px 0;
    }
    .feature-list li {
      list-style: none;
      font-size: 14px;
      color: #333;
      line-height: 1.8;
      padding-left: 4px;
    }
    .feature-list li::before { content: "✅ "; }
    .btn-register {
      display: inline-block;
      margin-top: 8px;
      background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
      color: #ffffff !important;
      font-weight: bold;
      padding: 14px 36px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      -webkit-text-fill-color: #ffffff;
      width: 100%;
    }
    .btn-register:hover { opacity: 0.9; }
    .note { font-size: 12px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👋</div>
    <div class="referral-badge" id="referral-badge">読み込み中...</div>
    <h1>IBD Pick へようこそ</h1>
    <p class="lead">IBD（炎症性腸疾患）の最新論文を<br>毎週月曜日にまとめてお届けするサービスです。</p>

    <ul class="feature-list">
      <li>PubMed掲載の最新IBD論文を自動収集</li>
      <li>AIが日本語で要約・カテゴリ別に整理</li>
      <li>今週の注目論文を毎週ピックアップ</li>
      <li>完全無料・いつでも配信停止可能</li>
    </ul>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdRCKH3QIWEgXy2aDJI0xkBKzxHoW7ZhC5NjExKDxvOOj-VuA/viewform" class="btn-register" target="_blank">
      無料で登録する →
    </a>
    <p class="note">登録後、確認メールが届きます。迷惑メールフォルダもご確認ください。</p>
  </div>

  <script>
    // URLパラメータから紹介者名を取得して表示
    const params = new URLSearchParams(window.location.search);
    const ref = params.get('ref');
    const badge = document.getElementById('referral-badge');
    if (ref && ref.trim() !== '') {
      badge.textContent = ref + ' さんからのご紹介';
    } else {
      badge.textContent = 'ご紹介いただきました';
    }
  </script>
</body>
</html>
